name: Update WinGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.0)"
        required: true

jobs:
  update:
    runs-on: windows-latest
    steps:
      - name: Determine version
        id: version
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.event.release.tag_name }}" -replace '^v', ''
          }
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install wingetcreate
        run: |
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Update WinGet manifest
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $repo = "${{ github.repository }}"
          $x64Url = "https://github.com/$repo/releases/download/$version/TailscaleCommandPalet-Setup-$version-x64.exe"
          $arm64Url = "https://github.com/$repo/releases/download/$version/TailscaleCommandPalet-Setup-$version-arm64.exe"

          .\wingetcreate.exe update `
            --id nickknissen.TailscaleCommandPalette `
            --version $version `
            --urls $x64Url $arm64Url `
            --out manifests

          $localeFile = Get-ChildItem -Path manifests -Recurse -Filter "*.locale.en-US.yaml" | Select-Object -First 1
          $content = Get-Content $localeFile.FullName -Raw

          # Add missing fields before ManifestType line
          $fields = @"
          PublisherUrl: https://github.com/nickknissen
          PublisherSupportUrl: https://github.com/nickknissen/TailscaleCommandPalet/issues
          PackageUrl: https://github.com/nickknissen/TailscaleCommandPalet
          LicenseUrl: https://github.com/nickknissen/TailscaleCommandPalet/blob/main/LICENSE
          Tags:
          - tailscale
          - command-palette
          - powertoys
          - windows-commandpalette-extension
          "@
          $fields = ($fields -split "`n" | ForEach-Object { $_.Trim() }) -join "`n"
          $content = $content -replace '(?m)^ManifestType:', "$fields`nManifestType:"
          Set-Content $localeFile.FullName -Value $content -NoNewline

          .\wingetcreate.exe submit `
            --token ${{ secrets.WINGET_PAT }} `
            manifests
